name: CI
on: [push, pull_request]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - run: clojure -M:lint
      - run: clojure -M:fmt check
      - run: clojure -M:test 2>&1 | tail -20
      - run: clojure -T:build uber
      - uses: actions/upload-artifact@v4
        with:
          name: noumenon-jar
          path: target/noumenon-*.jar

  launcher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: turtlequeue/setup-babashka@v1.7.0
        with: { babashka-version: 1.12.217 }
      - name: Verify launcher loads
        working-directory: launcher
        run: bb -cp src:resources -m noum.main version
      - name: Verify help output
        working-directory: launcher
        run: bb -cp src:resources -m noum.main help
